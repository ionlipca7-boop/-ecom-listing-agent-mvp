<section style="font-family:Arial,Helvetica,sans-serif;line-height:1.5;color:#222;max-width:900px;margin:0 auto;">
  <h1 style="font-size:22px;margin-bottom:12px;">{{TITLE}}</h1>

  <div style="border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin-bottom:16px;background:#fafafa;">
    <h2 style="font-size:18px;margin:0 0 8px 0;">Highlights</h2>
    <ul style="margin:0;padding-left:20px;">
      {{HIGHLIGHTS}}
    </ul>
  </div>

  <div style="border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin-bottom:16px;">
    <h2 style="font-size:18px;margin:0 0 8px 0;">Technische Daten</h2>
    <table style="width:100%;border-collapse:collapse;">
      {{SPEC_ROWS}}
    </table>
  </div>

  <div style="border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin-bottom:16px;">
    <h2 style="font-size:18px;margin:0 0 8px 0;">Lieferumfang</h2>
    <p style="margin:0;">{{DELIVERY}}</p>
  </div>

  <div style="border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin-bottom:16px;background:#fffdf6;">
    <h2 style="font-size:18px;margin:0 0 8px 0;">Hinweis</h2>
    <p style="margin:0;">Leistung, Ladegeschwindigkeit und Datenübertragung können je nach Gerät, Netzteil und Kabel-/Adapter-Kombination variieren. Es werden nur bestätigte Eigenschaften angegeben.</p>
  </div>
</section>
